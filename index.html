```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Interactive Pattern Generator</title>

<style>

body{
margin:0;
background:#0f0f18;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:20px;
}

.controls{
margin:20px;
}

label{
display:block;
margin:10px;
}

canvas{
background:black;
border:1px solid #333;
}

</style>

</head>

<body>

<h1>Interactive Pattern Generator</h1>

<div class="controls">

<label>
Density
<input type="range" id="density" min="100" max="5000" value="1000">
</label>

<label>
Chaos
<input type="range" id="chaos" min="1" max="20" value="5">
</label>

<label>
Rotation
<input type="range" id="rotation" min="0" max="360" value="0">
</label>

<button onclick="draw()">Generate</button>

</div>

<canvas id="canvas" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function draw(){

let density = document.getElementById("density").value;
let chaos = document.getElementById("chaos").value;
let rotation = document.getElementById("rotation").value * Math.PI / 180;

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let i=0;i<density;i++){

let angle = i * chaos * 0.01;

let r = i * 0.05;

let x = canvas.width/2 + Math.cos(angle + rotation) * r;
let y = canvas.height/2 + Math.sin(angle + rotation) * r;

ctx.fillStyle = "hsl("+i%360+",100%,60%)";

ctx.fillRect(x,y,2,2);

}

}

draw();

</script>

</body>
</html>
