<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Music Lab Studio</title>

<style>

body{
margin:0;
background:#0b0b12;
color:white;
font-family:Arial;
}

header{
padding:20px;
text-align:center;
background:#111;
font-size:24px;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
padding:20px;
}

.panel{
background:#151520;
padding:20px;
border-radius:10px;
}

h2{
margin-top:0;
color:#00eaff;
}

/* piano */

.piano{
display:flex;
}

.key{
width:40px;
height:160px;
background:white;
border:1px solid black;
cursor:pointer;
}

.key:active{
background:#00eaff;
}

/* sequencer */

.grid{
display:grid;
grid-template-columns:repeat(16,25px);
gap:4px;
margin-top:10px;
}

.cell{
width:25px;
height:25px;
background:#333;
cursor:pointer;
}

.cell.active{
background:#00eaff;
}

canvas{
width:100%;
height:200px;
background:black;
}

</style>

</head>

<body>

<header>
🎧 Music Lab Studio
</header>

<div class="container">

<div class="panel">
<h2>🎹 Synth Piano</h2>
<div class="piano" id="piano"></div>
</div>

<div class="panel">
<h2>🥁 Drum Machine</h2>

Kick
<div class="grid" id="kick"></div>

Snare
<div class="grid" id="snare"></div>

HiHat
<div class="grid" id="hihat"></div>

<br>

BPM
<input type="range" id="bpm" min="60" max="160" value="120">

<br><br>

<button onclick="play()">Play</button>
<button onclick="stop()">Stop</button>

</div>

<div class="panel">
<h2>📊 Audio Visualizer</h2>
<canvas id="visual"></canvas>
</div>

</div>

<script>

const ctx = new (window.AudioContext || window.webkitAudioContext)();

const analyser = ctx.createAnalyser();
analyser.connect(ctx.destination);

////////////////////////
// PIANO
////////////////////////

const notes=[
261,293,329,349,392,440,493,
523,587,659,698,784,880,987
];

const piano=document.getElementById("piano");

notes.forEach(freq=>{

let key=document.createElement("div");
key.className="key";

key.onclick=()=>playNote(freq);

piano.appendChild(key);

});

function playNote(freq){

let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.frequency.value=freq;

osc.connect(gain);
gain.connect(analyser);

osc.start();

gain.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+1);

osc.stop(ctx.currentTime+1);

}

////////////////////////
// DRUM MACHINE
////////////////////////

function createRow(id){

let arr=new Array(16).fill(false);
let container=document.getElementById(id);

arr.forEach((v,i)=>{

let cell=document.createElement("div");
cell.className="cell";

cell.onclick=()=>{
arr[i]=!arr[i];
cell.classList.toggle("active");
};

container.appendChild(cell);

});

return arr;

}

const kick=createRow("kick");
const snare=createRow("snare");
const hihat=createRow("hihat");

let step=0;
let timer;

function play(){

let bpm=document.getElementById("bpm").value;
let interval=60000/bpm/4;

timer=setInterval(()=>{

if(kick[step])kickSound();
if(snare[step])snareSound();
if(hihat[step])hatSound();

step=(step+1)%16;

},interval);

}

function stop(){
clearInterval(timer);
}

function kickSound(){

let osc=ctx.createOscillator();
let gain=ctx.createGain();

osc.frequency.setValueAtTime(150,ctx.currentTime);
osc.frequency.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);

osc.connect(gain);
gain.connect(analyser);

osc.start();
osc.stop(ctx.currentTime+0.5);

}

function snareSound(){

let noise=ctx.createBufferSource();
let buffer=ctx.createBuffer(1,44100,44100);
let data=buffer.getChannelData(0);

for(let i=0;i<44100;i++){
data[i]=Math.random()*2-1;
}

noise.buffer=buffer;

let gain=ctx.createGain();

noise.connect(gain);
gain.connect(analyser);

noise.start();
noise.stop(ctx.currentTime+0.2);

}

function hatSound(){

let osc=ctx.createOscillator();
osc.type="square";
osc.frequency.value=800;

let gain=ctx.createGain();

osc.connect(gain);
gain.connect(analyser);

osc.start();
osc.stop(ctx.currentTime+0.05);

}

////////////////////////
// VISUALIZER
////////////////////////

const canvas=document.getElementById("visual");
const c=canvas.getContext("2d");

canvas.width=600;
canvas.height=200;

function draw(){

requestAnimationFrame(draw);

let data=new Uint8Array(analyser.frequencyBinCount);
analyser.getByteFrequencyData(data);

c.fillStyle="black";
c.fillRect(0,0,canvas.width,canvas.height);

let width=canvas.width/data.length;

for(let i=0;i<data.length;i++){

let h=data[i];

c.fillStyle="cyan";
c.fillRect(i*width,canvas.height-h,width,h);

}

}

draw();

</script>

</body>
</html>
