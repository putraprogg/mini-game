<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM BREACHED</title>

<style>
body {
  margin:0;
  background:black;
  color:#00ff00;
  font-family: "Courier New", monospace;
  overflow:hidden;
  cursor: crosshair;
}

#terminal {
  padding:20px;
  height:100vh;
  overflow:hidden;
  white-space:pre-wrap;
  font-size:14px;
}

.glitch {
  animation: glitch 0.2s infinite;
}

@keyframes glitch {
  0% { transform: translate(0px, 0px); }
  25% { transform: translate(-2px, 2px); }
  50% { transform: translate(2px, -2px); }
  75% { transform: translate(-2px, -2px); }
  100% { transform: translate(2px, 2px); }
}

.red {
  color:red;
}

.blink {
  animation: blink 1s infinite;
}

@keyframes blink {
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}
</style>
</head>

<body onclick="triggerChaos()">

<div id="terminal">
Initializing system...
Connecting to secure server...
Access granted...
</div>

<script>
let errorCount = 0;
const terminal = document.getElementById("terminal");

// Sound generator (beep)
function playErrorSound(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const oscillator = ctx.createOscillator();
  oscillator.type = "square";
  oscillator.frequency.setValueAtTime(200 + Math.random()*600, ctx.currentTime);
  oscillator.connect(ctx.destination);
  oscillator.start();
  oscillator.stop(ctx.currentTime + 0.1);
}

function randomError(){
  const messages = [
    "ERROR 0x000F4 SYSTEM FAILURE",
    "ACCESS DENIED",
    "FIREWALL DISABLED",
    "PASSWORD LEAK DETECTED",
    "HACKER IP: 192.168." + Math.floor(Math.random()*255),
    "DATA BREACH IN PROGRESS",
    "ROOT ACCESS GRANTED",
    "ENCRYPTION BYPASSED",
    "SENDING FILES...",
    "DOWNLOADING VIRUS.exe"
  ];
  return messages[Math.floor(Math.random()*messages.length)];
}

function triggerChaos(){
  errorCount++;
  playErrorSound();

  const line = document.createElement("div");
  line.textContent = randomError();
  if(errorCount % 3 === 0){
    line.classList.add("red");
  }

  terminal.appendChild(line);

  // Tambah glitch effect
  if(errorCount > 5){
    document.body.classList.add("glitch");
  }

  // Tambah spam error otomatis
  if(errorCount > 10){
    setInterval(() => {
      const autoLine = document.createElement("div");
      autoLine.textContent = randomError();
      autoLine.classList.add("red");
      terminal.appendChild(autoLine);
      playErrorSound();
      window.scrollTo(0, document.body.scrollHeight);
    }, 300);
  }

  // Mode total chaos
  if(errorCount > 20){
    terminal.innerHTML += "\n\n<span class='blink red'>SYSTEM COMPROMISED</span>\n";
    document.body.style.background = "darkred";
  }

  window.scrollTo(0, document.body.scrollHeight);
}

// Auto text typing effect
setInterval(() => {
  if(errorCount < 5){
    const typing = document.createElement("div");
    typing.textContent = "Scanning port " + Math.floor(Math.random()*9999) + "...";
    terminal.appendChild(typing);
    window.scrollTo(0, document.body.scrollHeight);
  }
}, 1000);
</script>

</body>
</html>
