<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Lab</title>

<style>

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:#0b0b12;
color:white;
overflow-x:hidden;
}

nav{
display:flex;
justify-content:space-between;
padding:15px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

nav h1{
color:#00eaff;
}

nav a{
margin:0 10px;
text-decoration:none;
color:white;
}

section{
padding:60px 40px;
}

.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#00eaff;
color:black;
cursor:pointer;
font-weight:bold;
}

.piano{
display:flex;
margin-top:30px;
}

.key{
width:50px;
height:200px;
border:1px solid black;
background:white;
position:relative;
cursor:pointer;
}

.black{
background:black;
width:30px;
height:120px;
position:absolute;
margin-left:-15px;
z-index:2;
}

.sequencer{
display:grid;
grid-template-columns:repeat(16,40px);
gap:5px;
margin-top:20px;
}

.step{
width:40px;
height:40px;
background:#222;
cursor:pointer;
}

.active{
background:#00eaff;
}

.controls{
margin-top:20px;
}

canvas{
width:100%;
height:300px;
background:black;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
margin-top:30px;
}

</style>
</head>

<body>

<nav>
<h1>MusicLab</h1>
<div>
<a href="#home">Home</a>
<a href="#synth">Music Lab</a>
<a href="#beat">Beat Creator</a>
<a href="#visual">Visualizer</a>
</div>
</nav>

<section class="hero" id="home">
<h2>Interactive Music Experience</h2>
<p>Create beats, play synth, and visualize music.</p>
<button onclick="document.getElementById('synth').scrollIntoView()">Start</button>
</section>

<section id="synth">
<h2>Virtual Synth</h2>
<div class="piano" id="piano"></div>
</section>

<section id="beat">
<h2>Beat Creator</h2>

<div class="sequencer" id="seq"></div>

<div class="controls">
<button onclick="playBeat()">Play</button>
<button onclick="stopBeat()">Stop</button>
<label>BPM</label>
<input type="range" id="bpm" min="60" max="180" value="120">
</div>

</section>

<section id="visual">
<h2>Music Visualizer</h2>

<input type="file" id="upload">

<canvas id="visualizer"></canvas>

</section>

<script>

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

/////////////////////////
// SYNTH
/////////////////////////

const notes = [
261.63,293.66,329.63,349.23,
392.00,440.00,493.88
];

const piano = document.getElementById("piano");

notes.forEach(freq=>{
let key=document.createElement("div");
key.className="key";

key.onclick=()=>playNote(freq);

piano.appendChild(key);
});

function playNote(freq){

let osc = audioCtx.createOscillator();
let gain = audioCtx.createGain();

osc.frequency.value=freq;

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();

gain.gain.setValueAtTime(1,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+1);

osc.stop(audioCtx.currentTime+1);

}

/////////////////////////
// SEQUENCER
/////////////////////////

const seq = document.getElementById("seq");

let pattern = new Array(16).fill(false);

for(let i=0;i<16;i++){

let step=document.createElement("div");
step.className="step";

step.onclick=()=>{
pattern[i]=!pattern[i];
step.classList.toggle("active");
}

seq.appendChild(step);

}

let interval;
let stepIndex=0;

function playBeat(){

let bpm=document.getElementById("bpm").value;

let speed=60000/bpm/4;

interval=setInterval(()=>{

if(pattern[stepIndex]){

playKick();

}

stepIndex=(stepIndex+1)%16;

},speed);

}

function stopBeat(){

clearInterval(interval);

}

function playKick(){

let osc=audioCtx.createOscillator();
let gain=audioCtx.createGain();

osc.frequency.setValueAtTime(150,audioCtx.currentTime);
osc.frequency.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);

gain.gain.setValueAtTime(1,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.5);

osc.connect(gain);
gain.connect(audioCtx.destination);

osc.start();
osc.stop(audioCtx.currentTime+0.5);

}

/////////////////////////
// VISUALIZER
/////////////////////////

const canvas=document.getElementById("visualizer");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

let analyser=audioCtx.createAnalyser();
analyser.fftSize=256;

let dataArray=new Uint8Array(analyser.frequencyBinCount);

function draw(){

requestAnimationFrame(draw);

analyser.getByteFrequencyData(dataArray);

ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

let barWidth=canvas.width/dataArray.length;

for(let i=0;i<dataArray.length;i++){

let barHeight=dataArray[i];

ctx.fillStyle="cyan";

ctx.fillRect(i*barWidth,canvas.height-barHeight,barWidth,barHeight);

}

}

draw();

/////////////////////////
// MUSIC UPLOAD
/////////////////////////

document.getElementById("upload").addEventListener("change",function(){

let file=this.files[0];

let reader=new FileReader();

reader.onload=function(){

audioCtx.decodeAudioData(reader.result,function(buffer){

let source=audioCtx.createBufferSource();
source.buffer=buffer;

source.connect(analyser);
analyser.connect(audioCtx.destination);

source.start();

});

}

reader.readAsArrayBuffer(file);

});

</script>

</body>
</html>
