<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Diagram Fungsi + Suara</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);
    color: white;
}
input, button {
    padding: 8px;
    font-size: 16px;
    margin: 5px;
}
canvas {
    background: white;
    border-radius: 10px;
}
</style>
</head>
<body>

<h2>📈 Diagram Fungsi Matematika + Suara 🎵</h2>
<p>Masukkan fungsi (contoh: sin(x), x*x, cos(x)*x)</p>

<input type="text" id="fungsi" value="sin(x)">
<button onclick="gambar()">Tampilkan Grafik</button>
<button onclick="mainkanSuara()">Mainkan Suara</button>

<br><br>
<canvas id="chart" width="600" height="400"></canvas>

<script>
let ctx = document.getElementById('chart').getContext('2d');
let chart;
let dataY = [];

function gambar() {
    let fungsiInput = document.getElementById("fungsi").value;

    let labels = [];
    dataY = [];

    for (let x = -10; x <= 10; x += 0.2) {
        labels.push(x.toFixed(1));
        try {
            let y = eval(fungsiInput);
            dataY.push(y);
        } catch {
            alert("Fungsi tidak valid!");
            return;
        }
    }

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'f(x)',
                data: dataY,
                borderColor: 'blue',
                borderWidth: 2,
                fill: false,
                tension: 0.1
            }]
        },
        options: {
            scales: {
                x: { display: true },
                y: { display: true }
            }
        }
    });
}

let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let oscillator;

function mainkanSuara() {
    if (!dataY.length) {
        alert("Tampilkan grafik dulu!");
        return;
    }

    let i = 0;
    oscillator = audioCtx.createOscillator();
    oscillator.type = "sine";
    oscillator.connect(audioCtx.destination);
    oscillator.start();

    let interval = setInterval(() => {
        if (i >= dataY.length) {
            clearInterval(interval);
            oscillator.stop();
            return;
        }

        let pitch = 300 + (dataY[i] * 20);
        oscillator.frequency.setValueAtTime(Math.abs(pitch), audioCtx.currentTime);
        i++;
    }, 50);
}
</script>

</body>
</html>
