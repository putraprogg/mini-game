<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess vs AI</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.css"/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#1e1e1e;
  color:white;
  text-align:center;
}
#board{
  width:90vw;
  max-width:500px;
  margin:20px auto;
}
.controls{
  margin:10px;
}
button, select{
  padding:8px;
  margin:5px;
  border:none;
  border-radius:5px;
}
.move-history{
  max-height:150px;
  overflow:auto;
  background:#111;
  padding:10px;
  margin:10px auto;
  width:90%;
  max-width:500px;
}
.highlight{
  background:radial-gradient(circle, yellow 30%, transparent 30%);
}
.dark-mode{
  background:#f4f4f4;
  color:black;
}
</style>
</head>

<body>

<h2>♟️ Chess vs AI</h2>

<div id="board"></div>

<div class="controls">
Difficulty:
<select id="difficulty">
<option value="2">Easy</option>
<option value="3" selected>Medium</option>
<option value="4">Hard</option>
</select>

<button onclick="undoMove()">Undo</button>
<button onclick="restartGame()">Restart</button>
<button onclick="flipBoard()">Flip</button>
<button onclick="toggleDark()">Dark Mode</button>
</div>

<div id="status"></div>
<div class="move-history" id="history"></div>

<audio id="moveSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9f28d6.mp3?filename=chess-move-6465.mp3"></audio>
<audio id="checkSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4b3e4fdfd3.mp3?filename=notification-2-269292.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.13.4/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard.min.js"></script>

<script>
var board = null
var game = new Chess()
var $status = document.getElementById('status')
var $history = document.getElementById('history')
var moveSound = document.getElementById("moveSound")
var checkSound = document.getElementById("checkSound")

function onDragStart (source, piece) {
  if (game.game_over()) return false
  if (piece.search(/^b/) !== -1) return false
}

function onDrop (source, target) {
  var move = game.move({
    from: source,
    to: target,
    promotion: 'q'
  })

  if (move === null) return 'snapback'

  moveSound.play()
  updateStatus()
  window.setTimeout(makeBestMove, 500)
}

function onSnapEnd () {
  board.position(game.fen())
}

var config = {
  draggable: true,
  position: 'start',
  onDragStart: onDragStart,
  onDrop: onDrop,
  onSnapEnd: onSnapEnd
}
board = Chessboard('board', config)

function updateStatus() {
  var status = ''
  if (game.in_checkmate()) {
    status = 'Checkmate!'
    checkSound.play()
  } else if (game.in_draw()) {
    status = 'Draw!'
  } else {
    status = game.turn() === 'w' ? 'Putih jalan' : 'Hitam jalan'
    if (game.in_check()) {
      status += ' - CHECK!'
      checkSound.play()
    }
  }
  $status.innerHTML = status
  $history.innerHTML = game.history().join(" ")
}

function evaluateBoard(board) {
  const values = {p:10, r:50, n:30, b:30, q:90, k:900}
  let total = 0
  board.forEach(row=>{
    row.forEach(piece=>{
      if(piece){
        total += piece.color==='w' ? values[piece.type] : -values[piece.type]
      }
    })
  })
  return total
}

function minimax(depth, game, alpha, beta, isMaximising) {
  if(depth===0) return evaluateBoard(game.board())

  const moves = game.moves()
  if(isMaximising){
    let maxEval = -Infinity
    for(let move of moves){
      game.move(move)
      let eval = minimax(depth-1, game, alpha, beta, false)
      game.undo()
      maxEval = Math.max(maxEval, eval)
      alpha = Math.max(alpha, eval)
      if(beta<=alpha) break
    }
    return maxEval
  } else {
    let minEval = Infinity
    for(let move of moves){
      game.move(move)
      let eval = minimax(depth-1, game, alpha, beta, true)
      game.undo()
      minEval = Math.min(minEval, eval)
      beta = Math.min(beta, eval)
      if(beta<=alpha) break
    }
    return minEval
  }
}

function makeBestMove(){
  var depth = parseInt(document.getElementById("difficulty").value)
  var bestMove = null
  var bestValue = -Infinity
  var moves = game.moves()

  for(let move of moves){
    game.move(move)
    let boardValue = minimax(depth-1, game, -Infinity, Infinity, false)
    game.undo()
    if(boardValue >= bestValue){
      bestValue = boardValue
      bestMove = move
    }
  }
  game.move(bestMove)
  board.position(game.fen())
  moveSound.play()
  updateStatus()
}

function undoMove(){
  game.undo()
  game.undo()
  board.position(game.fen())
  updateStatus()
}

function restartGame(){
  game.reset()
  board.start()
  updateStatus()
}

function flipBoard(){
  board.flip()
}

function toggleDark(){
  document.body.classList.toggle("dark-mode")
}

updateStatus()
</script>

</body>
</html>
