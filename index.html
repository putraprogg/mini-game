<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zulfikar Maps</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:Arial, sans-serif;
}

#map {
  height:100vh;
  width:100%;
}

.search-box {
  position:absolute;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  z-index:1000;
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  display:flex;
  gap:5px;
}

.search-box input {
  padding:8px;
  width:250px;
  border:1px solid #ccc;
  border-radius:5px;
}

.search-box button {
  padding:8px 12px;
  border:none;
  background:#007bff;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

.control-btn {
  position:absolute;
  right:15px;
  top:15px;
  z-index:1000;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.control-btn button {
  padding:8px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.dark {
  filter: invert(90%) hue-rotate(180deg);
}
</style>
</head>

<body>

<div class="search-box">
  <input type="text" id="search" placeholder="Cari lokasi...">
  <button onclick="searchLocation()">Cari</button>
</div>

<div class="control-btn">
  <button onclick="getLocation()">📍 Lokasi Saya</button>
  <button onclick="toggleDark()">🌙 Dark</button>
  <button onclick="map.zoomIn()">➕</button>
  <button onclick="map.zoomOut()">➖</button>
</div>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([-7.250445, 112.768845], 13); // Default Surabaya

// OpenStreetMap Tile
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var marker;
var routeLayer;

// Geolocation
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(position) {
      var lat = position.coords.latitude;
      var lon = position.coords.longitude;
      map.setView([lat, lon], 15);
      L.marker([lat, lon]).addTo(map)
        .bindPopup("Lokasi Anda")
        .openPopup();
    });
  } else {
    alert("Geolocation tidak didukung browser.");
  }
}

// Search Location (Nominatim API)
function searchLocation() {
  var query = document.getElementById("search").value;
  fetch("https://nominatim.openstreetmap.org/search?format=json&q=" + query)
    .then(res => res.json())
    .then(data => {
      if(data.length > 0){
        var lat = data[0].lat;
        var lon = data[0].lon;
        map.setView([lat, lon], 15);

        if(marker) map.removeLayer(marker);
        marker = L.marker([lat, lon]).addTo(map)
          .bindPopup(query)
          .openPopup();
      }
    });
}

// Tambah marker klik kanan
map.on('contextmenu', function(e){
  L.marker(e.latlng).addTo(map)
    .bindPopup("Marker tambahan")
    .openPopup();
});

// Routing OSRM
map.on('click', function(e){
  if(marker){
    var start = marker.getLatLng();
    var end = e.latlng;

    fetch(`https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson`)
      .then(res => res.json())
      .then(data => {
        if(routeLayer) map.removeLayer(routeLayer);
        var route = L.geoJSON(data.routes[0].geometry).addTo(map);
        routeLayer = route;
      });
  }
});

// Dark Mode
function toggleDark(){
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
