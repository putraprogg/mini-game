<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Exploration Game</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#info {
 position:absolute;
 top:10px;
 left:10px;
 color:white;
 font-family:Arial;
 z-index:100;
}
</style>
</head>
<body>
<div id="info">
🎮 WASD = Gerak | Mouse = Arahkan kamera | Klik planet untuk ledakkan 💥
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/PointerLockControls.js"></script>

<script>
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 200);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Pointer Lock (FPS style)
const controls = new THREE.PointerLockControls(camera, document.body);
document.body.addEventListener('click', () => controls.lock());
scene.add(controls.getObject());

// Light
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(10,10,10);
scene.add(light);

// ===== PLANET =====
const planetGeo = new THREE.SphereGeometry(10,64,64);
const planetMat = new THREE.MeshStandardMaterial({color:0x2244ff});
const planet = new THREE.Mesh(planetGeo, planetMat);
planet.position.set(0,0,-100);
scene.add(planet);

// ===== CITY =====
for(let i=0;i<50;i++){
 const geo = new THREE.BoxGeometry(1,Math.random()*5+2,1);
 const mat = new THREE.MeshStandardMaterial({color:0x00ffff});
 const building = new THREE.Mesh(geo,mat);
 building.position.set(
   (Math.random()-0.5)*15,
   geo.parameters.height/2 - 10,
   -100 + (Math.random()-0.5)*15
 );
 scene.add(building);
}

// ===== ALIEN =====
const alienGeo = new THREE.SphereGeometry(1,32,32);
const alienMat = new THREE.MeshStandardMaterial({color:0x00ff00});
const alien = new THREE.Mesh(alienGeo,alienMat);
alien.position.set(5,0,-95);
scene.add(alien);

// ===== GALAXY SPIRAL =====
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starVertices = [];
for(let i=0;i<starCount;i++){
 const radius = Math.random()*200;
 const angle = radius * 0.1;
 starVertices.push(
   Math.cos(angle)*radius,
   (Math.random()-0.5)*50,
   Math.sin(angle)*radius
 );
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const starMat = new THREE.PointsMaterial({color:0xffffff});
const galaxy = new THREE.Points(starGeo,starMat);
scene.add(galaxy);

// ===== MOVEMENT =====
const keys = {};
document.addEventListener("keydown", e=>keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e=>keys[e.key.toLowerCase()] = false);

function move(){
 if(keys["w"]) controls.moveForward(0.5);
 if(keys["s"]) controls.moveForward(-0.5);
 if(keys["a"]) controls.moveRight(-0.5);
 if(keys["d"]) controls.moveRight(0.5);
}

// ===== COLLISION & LANDING =====
function checkCollision(){
 const distance = controls.getObject().position.distanceTo(planet.position);
 if(distance < 12){
   document.getElementById("info").innerHTML="🌍 Landing berhasil! Kamu di planet!";
 }
 if(distance < 8){
   explodePlanet();
 }
}

// ===== EXPLOSION =====
let exploded=false;
function explodePlanet(){
 if(exploded) return;
 exploded=true;
 planet.material.color.set(0xff0000);
 for(let i=0;i<200;i++){
   const debrisGeo = new THREE.SphereGeometry(0.2,8,8);
   const debrisMat = new THREE.MeshBasicMaterial({color:0xff5500});
   const debris = new THREE.Mesh(debrisGeo,debrisMat);
   debris.position.copy(planet.position);
   scene.add(debris);

   const dir = new THREE.Vector3(
     (Math.random()-0.5)*2,
     (Math.random()-0.5)*2,
     (Math.random()-0.5)*2
   );

   function animateDebris(){
     debris.position.add(dir);
     requestAnimationFrame(animateDebris);
   }
   animateDebris();
 }
 scene.remove(planet);
}

// ===== ANIMATE =====
function animate(){
 requestAnimationFrame(animate);
 move();
 checkCollision();
 alien.rotation.y += 0.02;
 renderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener('resize',()=>{
 camera.aspect = window.innerWidth/window.innerHeight;
 camera.updateProjectionMatrix();
 renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
