<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kartini 3D Piano Synth</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
body{margin:0;background:black;color:white;text-align:center;font-family:Arial}
button{padding:10px;font-size:16px;margin:10px}
#container{width:100%;height:500px}
</style>
</head>
<body>

<h2>🎹 Ibu Kita Kartini - 3D Piano Mode 🌊</h2>

<button onclick="generateSurface()">Tampilkan Surface</button>
<button onclick="playKartini()">Mainkan Lagu</button>

<div id="container"></div>

<script>

let scene, camera, renderer, mesh;
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ==========================
// 3D SURFACE
// ==========================
function generateSurface(){

    document.getElementById("container").innerHTML="";

    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(60, window.innerWidth/500, 0.1, 1000);
    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(window.innerWidth, 500);
    document.getElementById("container").appendChild(renderer.domElement);

    let geometry = new THREE.PlaneGeometry(20,20,120,120);
    let pos = geometry.attributes.position;

    for(let i=0;i<pos.count;i++){
        let x = pos.getX(i);
        let y = pos.getY(i);
        let z = Math.sin(Math.sqrt(x*x+y*y));
        pos.setZ(i,z);
    }

    geometry.computeVertexNormals();

    let material = new THREE.MeshStandardMaterial({
        color:0x00ffcc,
        side:THREE.DoubleSide
    });

    mesh = new THREE.Mesh(geometry,material);
    scene.add(mesh);

    let light = new THREE.PointLight(0xffffff,1);
    light.position.set(20,20,20);
    scene.add(light);

    camera.position.set(0,-30,25);
    camera.lookAt(0,0,0);

    function animate(){
        requestAnimationFrame(animate);
        mesh.rotation.z += 0.002;
        renderer.render(scene,camera);
    }
    animate();
}

// ==========================
// LAGU KARTINI (JELAS & LAMBAT)
// ==========================
function playKartini(){

    const scale = [
        261.63, // Do
        293.66, // Re
        329.63, // Mi
        349.23, // Fa
        392.00, // Sol
        440.00, // La
        493.88, // Si
        523.25  // Do tinggi
    ];

    // Bait awal "Ibu Kita Kartini"
    const melody = [
        0,0,1,2,2,1,0,1,
        2,3,4,4,3,2,3,4,
        5,4,3,2,1,0
    ];

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    let panner = audioCtx.createStereoPanner();

    osc.type = "sine";

    osc.connect(panner);
    panner.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.value = 0.3;

    osc.start();

    let i = 0;

    let interval = setInterval(()=>{

        if(i >= melody.length){
            clearInterval(interval);
            osc.stop();
            return;
        }

        let freq = scale[melody[i]];
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        // stereo kiri-kanan
        let pan = (i/melody.length)*2 - 1;
        panner.pan.setValueAtTime(pan, audioCtx.currentTime);

        // warna surface ikut nada
        if(mesh){
            let hue = freq % 360;
            mesh.material.color.set(`hsl(${hue},100%,50%)`);
        }

        i++;

    }, 600); // tempo pelan & jelas
}

</script>

</body>
</html>
