<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Hafalan Doa Qunut</title>

<style>

body{
font-family:Segoe UI,Arial;
background:linear-gradient(135deg,#16222a,#3a6073);
color:white;
text-align:center;
padding:30px;
}

.container{
max-width:900px;
margin:auto;
background:rgba(0,0,0,0.35);
padding:30px;
border-radius:15px;
}

h1{
margin-bottom:20px;
}

.line{
font-size:32px;
direction:rtl;
margin:18px;
padding:12px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.line.hidden{
background:#444;
color:transparent;
text-shadow:0 0 12px white;
}

.line:hover{
background:#555;
}

.word{
padding:2px 6px;
border-radius:6px;
}

.highlight{
background:#ffd54f;
color:black;
}

button{
padding:10px 18px;
margin:6px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
background:#00e5ff;
}

button:hover{
background:#18ffff;
}

</style>
</head>

<body>

<div class="container">

<h1>🕌 Hafalan Doa Qunut</h1>

<div id="doa"></div>

<br>

<button onclick="startReading()">▶ Baca Bersama</button>
<button onclick="hideLines()">🧠 Mode Hafalan</button>
<button onclick="resetAll()">🔄 Reset</button>

</div>

<script>

const lines = [

"اَللّهُمَّ اهْدِنِىْ فِيْمَنْ هَدَيْتَ",
"وَعَافِنِى فِيْمَنْ عَافَيْتَ",
"وَتَوَلَّنِىْ فِيْمَنْ تَوَلَّيْتَ",
"وَبَارِكْ لِىْ فِيْمَا اَعْطَيْتَ",
"وَقِنِيْ شَرَّمَا قَضَيْتَ",
"فَاِنَّكَ تَقْضِىْ وَلاَ يُقْضَى عَلَيْكَ",
"وَاِنَّهُ لاَ يَذِلُّ مَنْ وَالَيْتَ",
"وَلاَ يَعِزُّ مَنْ عَادَيْتَ",
"تَبَارَكْتَ رَبَّنَا وَتَعَالَيْتَ",
"فَلَكَ الْحَمْدُ عَلَى مَا قَضَيْتَ",
"وَاَسْتَغْفِرُكَ وَاَتُوْبُ اِلَيْكَ",
"وَصَلَّى اللهُ عَلَى سَيِّدَنَا مُحَمَّدٍ النَّبِيِّ اْلاُمِّيِّ",
"وَعَلَى آلِهِ وَصَحْبِهِ وَسَلَّمَ"

]

const doaDiv=document.getElementById("doa")

function render(){

doaDiv.innerHTML=""

lines.forEach((line,i)=>{

let div=document.createElement("div")
div.className="line"
div.dataset.index=i

let words=line.split(" ")

words.forEach(w=>{
let span=document.createElement("span")
span.className="word"
span.textContent=w+" "
div.appendChild(span)
})

div.onclick=()=>{
div.classList.remove("hidden")
}

doaDiv.appendChild(div)

})

}

render()

function hideLines(){

document.querySelectorAll(".line").forEach(line=>{
line.classList.add("hidden")
})

}

function resetAll(){
render()
}

function startReading(){

let words=document.querySelectorAll(".word")

let i=0

function step(){

if(i>0) words[i-1].classList.remove("highlight")

if(i<words.length){

words[i].classList.add("highlight")

let utter=new SpeechSynthesisUtterance(words[i].textContent)
utter.lang="ar"
speechSynthesis.speak(utter)

i++
setTimeout(step,900)

}

}

step()

}

</script>

</body>
</html>
