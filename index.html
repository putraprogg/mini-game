```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Formula Visualizer</title>

<style>

body{
margin:0;
background:#0f0f18;
color:white;
font-family:Arial;
text-align:center;
}

#controls{
padding:15px;
background:#111;
}

input{
width:300px;
padding:6px;
}

canvas{
background:black;
display:block;
margin:auto;
}

</style>

</head>

<body>

<div id="controls">

Formula f(x,y):

<input id="formula" value="sin(x)+cos(y)">

<button onclick="draw()">Draw</button>

Zoom
<input type="range" id="zoom" min="10" max="100" value="40">

</div>

<canvas id="canvas" width="800" height="500"></canvas>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function draw(){

let formula=document.getElementById("formula").value;

let zoom=document.getElementById("zoom").value;

let f;

try{
f=new Function("x","y","return "+formula);
}catch(e){
alert("Invalid formula");
return;
}

let w=canvas.width;
let h=canvas.height;

ctx.fillStyle="black";
ctx.fillRect(0,0,w,h);

for(let px=0;px<w;px++){

for(let py=0;py<h;py++){

let x=(px-w/2)/zoom;
let y=(py-h/2)/zoom;

let z;

try{
z=f(x,y);
}catch{
continue;
}

let color=(Math.sin(z)+1)*120;

ctx.fillStyle="hsl("+color+",100%,50%)";

ctx.fillRect(px,py,1,1);

}

}

}

draw();

</script>

</body>
</html>
