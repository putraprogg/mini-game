<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Tangkap Ayam</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  text-align:center;
  background: linear-gradient(to bottom, #87CEEB, #ffffff);
  overflow:hidden;
}

h1 {
  margin-top:20px;
}

#score, #timer {
  font-size:20px;
  margin:10px;
}

#gameArea {
  position:relative;
  width:100%;
  height:80vh;
}

.chicken {
  position:absolute;
  font-size:50px;
  cursor:pointer;
  transition: transform 0.1s;
}

.chicken:active {
  transform: scale(0.8);
}

#startBtn {
  padding:10px 20px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:orange;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🐔 Tangkap Si Ayam Kabur!</h1>
<div id="score">Skor: 0</div>
<div id="timer">Waktu: 20</div>
<button id="startBtn" onclick="startGame()">Mulai Game</button>

<div id="gameArea"></div>

<script>
let score = 0;
let timeLeft = 20;
let gameInterval;
let timerInterval;

function startGame() {
  score = 0;
  timeLeft = 20;
  document.getElementById("score").innerText = "Skor: " + score;
  document.getElementById("timer").innerText = "Waktu: " + timeLeft;
  document.getElementById("startBtn").style.display = "none";

  spawnChicken();
  gameInterval = setInterval(spawnChicken, 800);

  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "Waktu: " + timeLeft;
    if(timeLeft <= 0){
      endGame();
    }
  }, 1000);
}

function spawnChicken(){
  const gameArea = document.getElementById("gameArea");
  const chicken = document.createElement("div");
  chicken.classList.add("chicken");
  chicken.innerText = "🐔";

  chicken.style.left = Math.random() * (window.innerWidth - 60) + "px";
  chicken.style.top = Math.random() * (window.innerHeight - 200) + "px";

  chicken.onclick = function(){
    score++;
    document.getElementById("score").innerText = "Skor: " + score;
    chicken.remove();
  };

  gameArea.appendChild(chicken);

  setTimeout(() => {
    chicken.remove();
  }, 700);
}

function endGame(){
  clearInterval(gameInterval);
  clearInterval(timerInterval);
  document.getElementById("startBtn").style.display = "inline-block";
  alert("Game Selesai! Skor kamu: " + score);
}
</script>

</body>
</html>
