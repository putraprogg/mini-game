<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM BREACHED</title>

<style>
body{
  margin:0;
  background:black;
  color:#00ff00;
  font-family:Courier New, monospace;
  overflow:hidden;
  cursor:crosshair;
}

#terminal{
  padding:20px;
  height:100vh;
  overflow:auto;
  white-space:pre-wrap;
}

.glitch{
  animation:glitch 0.15s infinite;
}

@keyframes glitch{
  0%{transform:translate(0)}
  25%{transform:translate(-3px,3px)}
  50%{transform:translate(3px,-3px)}
  75%{transform:translate(-3px,-3px)}
  100%{transform:translate(3px,3px)}
}

.red{color:red;}
.big{font-size:22px;}
.blink{animation:blink 1s infinite;}
@keyframes blink{
  0%,50%,100%{opacity:1;}
  25%,75%{opacity:0;}
}

#camera{
  position:fixed;
  top:10px;
  right:10px;
  width:200px;
  height:150px;
  background:#111;
  border:3px solid red;
  display:none;
  color:red;
  text-align:center;
  font-size:12px;
}

#mask{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:150px;
  display:none;
  animation:float 2s infinite ease-in-out;
}

@keyframes float{
  0%{transform:translate(-50%,0)}
  50%{transform:translate(-50%,-10px)}
  100%{transform:translate(-50%,0)}
}
</style>
</head>

<body onclick="triggerChaos()">

<div id="terminal">
Booting secure system...
Connecting firewall...
System ready...
</div>

<div id="camera">📸 CAMERA ACTIVE<br><br><span class="blink">Recording...</span></div>

<img id="mask" src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Guy_Fawkes_Mask.png">

<script>
let chaosLevel = 0;
let alarmStarted = false;
let countdownStarted = false;
const terminal = document.getElementById("terminal");

// Alarm Sound Generator
let alarmInterval;
function startAlarm(){
  if(alarmStarted) return;
  alarmStarted = true;
  alarmInterval = setInterval(()=>{
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type="sawtooth";
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.2);
  },300);
}

// Random error
function randomError(){
  const errors=[
    "ENCRYPTING FILES...",
    "ACCESSING CAMERA...",
    "FIREWALL DESTROYED",
    "PASSWORD STOLEN",
    "UPLOADING DATA...",
    "IP TRACE INITIATED",
    "RANSOMWARE DEPLOYED",
    "SECURITY FAILURE",
    "DELETING SYSTEM32...",
    "BITCOIN PAYMENT REQUIRED"
  ];
  return errors[Math.floor(Math.random()*errors.length)];
}

function triggerChaos(){
  chaosLevel++;

  const line=document.createElement("div");
  line.textContent=randomError();
  if(chaosLevel%2===0) line.classList.add("red");
  terminal.appendChild(line);
  terminal.scrollTop=terminal.scrollHeight;

  if(chaosLevel>3){
    document.body.classList.add("glitch");
    document.getElementById("camera").style.display="block";
  }

  if(chaosLevel>6){
    startAlarm();
    document.body.style.background="darkred";
  }

  if(chaosLevel>8){
    document.getElementById("mask").style.display="block";
  }

  if(chaosLevel>10 && !countdownStarted){
    startCountdown();
  }

  if(chaosLevel>2){
    document.documentElement.requestFullscreen().catch(()=>{});
  }
}

// Fake Encryption
function fakeEncrypt(){
  const files=["photo.jpg","document.docx","skripsi.pdf","data.xlsx","video.mp4"];
  files.forEach(file=>{
    const enc=document.createElement("div");
    enc.innerHTML="🔒 "+file+" → <span class='red'>ENCRYPTED</span>";
    terminal.appendChild(enc);
  });
}

// Countdown Self Destruct
function startCountdown(){
  countdownStarted=true;
  fakeEncrypt();

  let time=15;
  const cd=document.createElement("div");
  cd.classList.add("big","red","blink");
  terminal.appendChild(cd);

  const interval=setInterval(()=>{
    cd.textContent="SELF DESTRUCT IN: "+time+"s";
    time--;
    if(time<0){
      clearInterval(interval);
      document.body.innerHTML="<h1 style='color:red;text-align:center;margin-top:20%;font-size:50px;'>💀 SYSTEM DESTROYED 💀</h1>";
    }
  },1000);
}
</script>

</body>
</html>
