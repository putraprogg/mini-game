<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Qunut Memorizer</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Segoe UI,Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
}

nav button{
margin:5px;
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.line{
font-size:30px;
direction:rtl;
margin:12px;
padding:10px;
border-radius:10px;
background:#1e293b;
cursor:pointer;
}

.hidden{
background:#334155;
color:#334155;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin:10px;
}

.drag{
padding:10px;
margin:8px;
background:#2563eb;
border-radius:8px;
cursor:grab;
}

.dropzone{
min-height:50px;
margin:8px;
padding:10px;
border:2px dashed #555;
border-radius:8px;
}

.correct{
background:#16a34a;
}

</style>
</head>

<body>

<header>🕌 Qunut Memorizer</header>

<nav>
<button onclick="show('read')">📖 Baca</button>
<button onclick="show('memorize')">🧠 Hafalan</button>
<button onclick="show('game')">🧩 Game Susun</button>
</nav>

<div class="container">

<div id="read"></div>
<div id="memorize" style="display:none"></div>
<div id="game" style="display:none"></div>

</div>

<script>

const lines=[

"اَللّهُمَّ اهْدِنِىْ فِيْمَنْ هَدَيْتَ",
"وَعَافِنِى فِيْمَنْ عَافَيْتَ",
"وَتَوَلَّنِىْ فِيْمَنْ تَوَلَّيْتَ",
"وَبَارِكْ لِىْ فِيْمَا اَعْطَيْتَ",
"وَقِنِيْ شَرَّمَا قَضَيْتَ",
"فَاِنَّكَ تَقْضِىْ وَلاَ يُقْضَى عَلَيْكَ",
"وَاِنَّهُ لاَ يَذِلُّ مَنْ وَالَيْتَ",
"وَلاَ يَعِزُّ مَنْ عَادَيْتَ",
"تَبَارَكْتَ رَبَّنَا وَتَعَالَيْتَ",
"فَلَكَ الْحَمْدُ عَلَى مَا قَضَيْتَ",
"وَاَسْتَغْفِرُكَ وَاَتُوْبُ اِلَيْكَ",
"وَصَلَّى اللهُ عَلَى سَيِّدَنَا مُحَمَّدٍ النَّبِيِّ اْلاُمِّيِّ",
"وَعَلَى آلِهِ وَصَحْبِهِ وَسَلَّمَ"

]

function show(id){

document.querySelectorAll(".container > div").forEach(d=>d.style.display="none")
document.getElementById(id).style.display="block"

}

function renderRead(){

const div=document.getElementById("read")

lines.forEach(line=>{

let d=document.createElement("div")
d.className="line"
d.textContent=line

div.appendChild(d)

})

}

function renderMemorize(){

const div=document.getElementById("memorize")

lines.forEach(line=>{

let d=document.createElement("div")
d.className="line hidden"
d.textContent=line

d.onclick=()=>{

d.classList.remove("hidden")

}

div.appendChild(d)

})

}

function renderGame(){

const div=document.getElementById("game")

let shuffled=[...lines].sort(()=>Math.random()-0.5)

let dragArea=document.createElement("div")
let dropArea=document.createElement("div")

dragArea.innerHTML="<h3>Drag kalimat</h3>"
dropArea.innerHTML="<h3>Susun di sini</h3>"

shuffled.forEach((line,i)=>{

let d=document.createElement("div")
d.className="drag"
d.draggable=true
d.id="drag"+i
d.textContent=line

d.ondragstart=e=>{
e.dataTransfer.setData("text",d.id)
}

dragArea.appendChild(d)

})

lines.forEach((line,i)=>{

let zone=document.createElement("div")
zone.className="dropzone"

zone.ondragover=e=>e.preventDefault()

zone.ondrop=e=>{

e.preventDefault()

let id=e.dataTransfer.getData("text")
let el=document.getElementById(id)

zone.appendChild(el)

if(el.textContent==lines[i]){
zone.classList.add("correct")
}

}

dropArea.appendChild(zone)

})

div.appendChild(dragArea)
div.appendChild(dropArea)

}

renderRead()
renderMemorize()
renderGame()

</script>

</body>
</html>
