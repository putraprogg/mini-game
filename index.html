<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grandmaster AI - Catur Modern</title>
    
    <!-- External Dependencies -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* --- CUSTOM CSS SECTION --- */
        :root {
            --bg-dark: #09090b;
            --board-light: #3f3f46;
            --board-dark: #18181b;
        }

        body {
            background-color: var(--bg-dark);
            -webkit-tap-highlight-color: transparent;
        }

        /* Chessboard.js overrides for modern look */
        .board-b72b1 {
            border: 4px solid #27272a !important;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .white-1e1d7 {
            background-color: var(--board-light) !important;
            color: #a1a1aa !important;
        }

        .black-3c85d {
            background-color: var(--board-dark) !important;
            color: #3f3f46 !important;
        }

        /* Square Highlighting */
        .highlight-white {
            box-shadow: inset 0 0 3px 3px rgba(255, 255, 255, 0.2);
        }
        .highlight-black {
            box-shadow: inset 0 0 3px 3px rgba(0, 0, 0, 0.2);
        }
        .highlight-hint {
            background-color: rgba(59, 130, 246, 0.4) !important;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            #board {
                width: 95vw !important;
                height: 95vw !important;
                margin: 0 auto;
            }
        }

        /* Custom Scrollbar for Move History */
        .scrollbar-custom::-webkit-scrollbar {
            width: 4px;
        }
        .scrollbar-custom::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-custom::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 10px;
        }

        /* Animation for AI Thinking */
        @keyframes pulse-blue {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-pulse-blue {
            animation: pulse-blue 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex flex-col font-sans overflow-x-hidden">

    <!-- Header / Navigation -->
    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <i data-lucide="trophy" class="text-amber-500"></i>
            <h1 class="text-lg md:text-xl font-bold tracking-tight">Grandmaster <span class="text-blue-500">AI</span></h1>
        </div>
        <div id="game-status" class="px-4 py-1 bg-zinc-800 rounded-full text-xs md:text-sm font-semibold border border-zinc-700">
            Putih Melangkah
        </div>
    </header>

    <main class="flex-1 container mx-auto p-2 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
        
        <!-- Left Column: Chessboard & Controls -->
        <div class="lg:col-span-7 flex flex-col gap-4">
            
            <!-- Opponent Info & Captured -->
            <div class="flex justify-between items-center px-2">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-zinc-800 rounded flex items-center justify-center">
                        <i data-lucide="cpu" class="w-5 h-5 text-blue-500"></i>
                    </div>
                    <span class="text-sm font-medium">AI Engine</span>
                </div>
                <div id="captured-black" class="flex gap-0.5 h-6 items-center"></div>
            </div>

            <!-- The Board -->
            <div class="relative bg-zinc-900 p-1 md:p-2 rounded-xl shadow-2xl ring-1 ring-zinc-800">
                <div id="board" class="w-full aspect-square"></div>
                
                <!-- Pawn Promotion Modal -->
                <div id="promotion-modal" class="hidden absolute inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center rounded-xl">
                    <div class="bg-zinc-800 p-4 md:p-6 rounded-2xl border border-zinc-700 shadow-2xl text-center">
                        <h3 class="text-sm md:text-lg font-bold mb-4 uppercase tracking-wider">Pilih Promosi</h3>
                        <div class="flex gap-2 md:gap-4">
                            <button onclick="selectPromotion('q')" class="p-3 md:p-4 bg-zinc-700 hover:bg-blue-600 rounded-xl transition-all">
                                <span class="text-xs font-bold">QUEEN</span>
                            </button>
                            <button onclick="selectPromotion('r')" class="p-3 md:p-4 bg-zinc-700 hover:bg-blue-600 rounded-xl transition-all">
                                <span class="text-xs font-bold">ROOK</span>
                            </button>
                            <button onclick="selectPromotion('b')" class="p-3 md:p-4 bg-zinc-700 hover:bg-blue-600 rounded-xl transition-all">
                                <span class="text-xs font-bold">BISHOP</span>
                            </button>
                            <button onclick="selectPromotion('n')" class="p-3 md:p-4 bg-zinc-700 hover:bg-blue-600 rounded-xl transition-all">
                                <span class="text-xs font-bold">KNIGHT</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Player Info & Captured -->
            <div class="flex justify-between items-center px-2">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center">
                        <i data-lucide="user" class="w-5 h-5 text-white"></i>
                    </div>
                    <span class="text-sm font-medium">Pemain</span>
                </div>
                <div id="captured-white" class="flex gap-0.5 h-6 items-center"></div>
            </div>

            <!-- Controls -->
            <div class="grid grid-cols-1 md:flex md:flex-row justify-between items-center bg-zinc-900 p-4 rounded-xl border border-zinc-800 gap-4">
                <div class="flex gap-2">
                    <button id="undo-btn" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg transition-all text-sm">
                        <i data-lucide="undo-2" class="w-4 h-4"></i> Undo
                    </button>
                    <button id="flip-btn" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg transition-all text-sm">
                        <i data-lucide="repeat" class="w-4 h-4"></i> Flip
                    </button>
                    <button id="restart-btn" class="flex-1 md:flex-none flex items-center justify-center gap-2 px-4 py-2 bg-red-950/20 hover:bg-red-900/40 text-red-400 rounded-lg transition-all text-sm border border-red-900/30">
                        <i data-lucide="refresh-cw" class="w-4 h-4"></i> Reset
                    </button>
                </div>
                <div class="flex items-center justify-between md:justify-end gap-3 border-t md:border-t-0 border-zinc-800 pt-3 md:pt-0">
                    <span class="text-[10px] font-bold text-zinc-500 uppercase">Difficulty:</span>
                    <div class="flex p-1 bg-zinc-800 rounded-lg">
                        <button class="diff-btn px-3 py-1 text-[10px] rounded-md transition-all" data-value="2">Easy</button>
                        <button class="diff-btn px-3 py-1 text-[10px] rounded-md transition-all bg-blue-600 text-white" data-value="3">Medium</button>
                        <button class="diff-btn px-3 py-1 text-[10px] rounded-md transition-all" data-value="4">Hard</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: Stats & History -->
        <div class="lg:col-span-5 flex flex-col gap-4">
            
            <!-- AI Evaluation Panel -->
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                <div class="flex justify-between items-end mb-3">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-bold uppercase text-zinc-500">AI Evaluation</span>
                        <span id="eval-score" class="text-2xl font-mono font-bold text-blue-400">+0.0</span>
                    </div>
                    <div id="ai-thinking-tag" class="hidden flex items-center gap-2 text-[10px] text-blue-500 font-bold uppercase animate-pulse-blue">
                        <div class="w-2 h-2 bg-blue-500 rounded-full"></div> Thinking
                    </div>
                </div>
                <div class="h-2 bg-zinc-800 rounded-full overflow-hidden flex ring-1 ring-zinc-700">
                    <div id="eval-bar" class="bg-blue-500 h-full transition-all duration-700" style="width: 50%"></div>
                </div>
            </div>

            <!-- Move History (PGN) -->
            <div class="bg-zinc-900 rounded-xl border border-zinc-800 flex-1 flex flex-col overflow-hidden min-h-[300px] max-h-[400px]">
                <div class="p-3 border-b border-zinc-800 bg-zinc-800/20 flex items-center gap-2">
                    <i data-lucide="list" class="w-4 h-4 text-zinc-500"></i>
                    <h2 class="font-bold text-xs uppercase tracking-widest text-zinc-400">Move History</h2>
                </div>
                <div id="move-history" class="flex-1 overflow-y-auto p-2 grid grid-cols-1 gap-1 text-xs font-mono scrollbar-custom">
                    <!-- History rows -->
                </div>
            </div>

            <!-- Player Settings -->
            <div class="bg-zinc-900 p-4 rounded-xl border border-zinc-800">
                <div class="flex items-center justify-between">
                    <div class="flex flex-col gap-2">
                        <span class="text-[10px] text-zinc-500 font-bold uppercase">Play As</span>
                        <div class="flex gap-2">
                            <button id="choose-white" class="w-10 h-10 rounded-lg bg-zinc-100 ring-2 ring-blue-500 ring-offset-4 ring-offset-zinc-950 transition-all flex items-center justify-center text-zinc-900 font-bold">W</button>
                            <button id="choose-black" class="w-10 h-10 rounded-lg bg-zinc-800 ring-offset-4 ring-offset-zinc-950 transition-all flex items-center justify-center text-zinc-200 font-bold">B</button>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] text-zinc-500 italic uppercase">FIDE Rules Compliant</p>
                        <p class="text-[11px] text-zinc-400">Minimax Alpha-Beta</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        /**
         * --- AI ENGINE LOGIC ---
         * Implements Minimax with Alpha-Beta Pruning
         * and Piece-Square Tables for positional evaluation.
         */
        const PIECE_VALUES = { p: 10, n: 32, b: 33, r: 50, q: 90, k: 900 };

        const PST = {
            p: [
                [0,  0,  0,  0,  0,  0,  0,  0],
                [50, 50, 50, 50, 50, 50, 50, 50],
                [10, 10, 20, 30, 30, 20, 10, 10],
                [5,  5, 10, 25, 25, 10,  5,  5],
                [0,  0,  0, 20, 20,  0,  0,  0],
                [5, -5,-10,  0,  0,-10, -5,  5],
                [5, 10, 10,-20,-20, 10, 10,  5],
                [0,  0,  0,  0,  0,  0,  0,  0]
            ],
            n: [
                [-50,-40,-30,-30,-30,-30,-40,-50],
                [-40,-20,  0,  0,  0,  0,-20,-40],
                [-30,  0, 10, 15, 15, 10,  0,-30],
                [-30,  5, 15, 20, 20, 15,  5,-30],
                [-30,  0, 15, 20, 20, 15,  0,-30],
                [-30,  5, 10, 15, 15, 10,  5,-30],
                [-40,-20,  0,  5,  5,  0,-20,-40],
                [-50,-40,-30,-30,-30,-30,-40,-50]
            ],
            b: [
                [-20,-10,-10,-10,-10,-10,-10,-20],
                [-10,  0,  0,  0,  0,  0,  0,-10],
                [-10,  0,  5, 10, 10,  5,  0,-10],
                [-10,  5,  5, 10, 10,  5,  5,-10],
                [-10,  0, 10, 10, 10, 10,  0,-10],
                [-10, 10, 10, 10, 10, 10, 10,-10],
                [-10,  5,  0,  0,  0,  0,  5,-10],
                [-20,-10,-10,-10,-10,-10,-10,-20]
            ],
            r: [
                [0,  0,  0,  0,  0,  0,  0,  0],
                [5, 10, 10, 10, 10, 10, 10,  5],
                [-5,  0,  0,  0,  0,  0,  0, -5],
                [-5,  0,  0,  0,  0,  0,  0, -5],
                [-5,  0,  0,  0,  0,  0,  0, -5],
                [-5,  0,  0,  0,  0,  0,  0, -5],
                [-5,  0,  0,  0,  0,  0,  0, -5],
                [0,  0,  0,  5,  5,  0,  0,  0]
            ],
            q: [
                [-20,-10,-10, -5, -5,-10,-10,-20],
                [-10,  0,  0,  0,  0,  0,  0,-10],
                [-10,  0,  5,  5,  5,  5,  0,-10],
                [-5,  0,  5,  5,  5,  5,  0, -5],
                [0,  0,  5,  5,  5,  5,  0, -5],
                [-10,  5,  5,  5,  5,  5,  0,-10],
                [-10,  0,  5,  0,  0,  0,  0,-10],
                [-20,-10,-10, -5, -5,-10,-10,-20]
            ],
            k: [
                [-30,-40,-40,-50,-50,-40,-40,-30],
                [-30,-40,-40,-50,-50,-40,-40,-30],
                [-30,-40,-40,-50,-50,-40,-40,-30],
                [-30,-40,-40,-50,-50,-40,-40,-30],
                [-20,-30,-30,-40,-40,-30,-30,-20],
                [-10,-20,-20,-20,-20,-20,-20,-10],
                [20, 20,  0,  0,  0,  0, 20, 20],
                [20, 30, 10,  0,  0, 10, 30, 20]
            ]
        };

        function evaluateBoard(game) {
            let totalEvaluation = 0;
            const board = game.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const piece = board[i][j];
                    if (piece) {
                        const val = PIECE_VALUES[piece.type];
                        const x = piece.color === 'w' ? i : 7 - i;
                        const pstVal = PST[piece.type][x][j];
                        const score = val + pstVal;
                        totalEvaluation += (piece.color === 'w' ? score : -score);
                    }
                }
            }
            return totalEvaluation;
        }

        function minimax(game, depth, alpha, beta, isMaximizing) {
            if (depth === 0) return -evaluateBoard(game);

            const moves = game.moves();
            if (moves.length === 0) {
                if (game.in_check()) return isMaximizing ? -10000 : 10000;
                return 0;
            }

            if (isMaximizing) {
                let bestEval = -Infinity;
                for (const move of moves) {
                    game.move(move);
                    bestEval = Math.max(bestEval, minimax(game, depth - 1, alpha, beta, !isMaximizing));
                    game.undo();
                    alpha = Math.max(alpha, bestEval);
                    if (beta <= alpha) break;
                }
                return bestEval;
            } else {
                let bestEval = Infinity;
                for (const move of moves) {
                    game.move(move);
                    bestEval = Math.min(bestEval, minimax(game, depth - 1, alpha, beta, !isMaximizing));
                    game.undo();
                    beta = Math.min(beta, bestEval);
                    if (beta <= alpha) break;
                }
                return bestEval;
            }
        }

        function getBestMove(game, depth) {
            const possibleMoves = game.moves();
            if (possibleMoves.length === 0) return null;

            // Simple move ordering: captures first
            possibleMoves.sort((a, b) => (b.includes('x') ? 1 : 0) - (a.includes('x') ? 1 : 0));

            let bestMove = null;
            let bestValue = -Infinity;
            const isWhite = game.turn() === 'w';

            for (const move of possibleMoves) {
                game.move(move);
                // We want to maximize for current player, but minimax returns absolute value
                let boardValue = minimax(game, depth - 1, -Infinity, Infinity, false);
                game.undo();

                // If it's black's turn, we actually want the most negative board value
                const actualValue = isWhite ? -boardValue : boardValue;

                if (actualValue > bestValue) {
                    bestValue = actualValue;
                    bestMove = move;
                }
            }
            return bestMove;
        }

        /**
         * --- MAIN GAME CONTROLLER ---
         */
        let board = null;
        let game = new Chess();
        let playerColor = 'w';
        let currentDepth = 3;
        let pendingMove = null;
        let captured = { w: [], b: [] };

        const PIECE_SYMBOLS = { p: '♟', n: '♞', b: '♝', r: '♜', q: '♛', k: '♚' };
        const sounds = {
            move: new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-self.mp3'),
            capture: new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/capture.mp3'),
            check: new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/move-check.mp3'),
            end: new Audio('https://images.chesscomfiles.com/chess-themes/sounds/_MP3_/default/game-end.mp3')
        };

        function playSound(type) {
            if (sounds[type]) {
                sounds[type].currentTime = 0;
                sounds[type].play().catch(() => {});
            }
        }

        function onDragStart(source, piece, position, orientation) {
            if (game.game_over()) return false;
            if ((game.turn() === 'w' && piece.search(/^b/) !== -1) ||
                (game.turn() === 'b' && piece.search(/^w/) !== -1)) {
                return false;
            }
            if (game.turn() !== playerColor) return false;
        }

        function onDrop(source, target) {
            const moveObj = { from: source, to: target, promotion: 'q' };
            
            // Check for promotion
            const piece = game.get(source);
            if (piece && piece.type === 'p' && (target[1] === '8' || target[1] === '1')) {
                const moves = game.moves({ square: source, verbose: true });
                const isValid = moves.some(m => m.to === target);
                if (isValid) {
                    pendingMove = { from: source, to: target };
                    $('#promotion-modal').removeClass('hidden');
                    return 'trash';
                }
            }

            const move = game.move(moveObj);
            if (move === null) return 'snapback';

            handleMoveResult(move);
        }

        window.selectPromotion = function(p) {
            if (pendingMove) {
                const move = game.move({ from: pendingMove.from, to: pendingMove.to, promotion: p });
                $('#promotion-modal').addClass('hidden');
                pendingMove = null;
                board.position(game.fen());
                handleMoveResult(move);
            }
        };

        function handleMoveResult(move) {
            if (move.captured) {
                captured[move.color === 'w' ? 'b' : 'w'].push(move.captured);
                playSound('capture');
            } else if (game.in_check()) {
                playSound('check');
            } else {
                playSound('move');
            }

            updateUI();
            
            if (!game.game_over()) {
                window.setTimeout(makeComputerMove, Math.random() * 1000 + 500);
            } else {
                playSound('end');
            }
        }

        function makeComputerMove() {
            if (game.game_over()) return;

            $('#ai-thinking-tag').removeClass('hidden');
            
            // Allow UI to update before heavy computation
            setTimeout(() => {
                const bestMove = getBestMove(game, currentDepth);
                if (bestMove) {
                    const move = game.move(bestMove);
                    board.position(game.fen());
                    
                    if (move.captured) {
                        captured[move.color === 'w' ? 'b' : 'w'].push(move.captured);
                        playSound('capture');
                    } else if (game.in_check()) {
                        playSound('check');
                    } else {
                        playSound('move');
                    }
                    
                    if (game.game_over()) playSound('end');
                    updateUI();
                }
                $('#ai-thinking-tag').addClass('hidden');
            }, 50);
        }

        function updateUI() {
            // Update Status Text
            let status = game.turn() === 'w' ? 'Putih Melangkah' : 'Hitam Melangkah';
            if (game.in_checkmate()) status = 'SKAKMAT! ' + (game.turn() === 'w' ? 'Hitam Menang' : 'Putih Menang');
            else if (game.in_draw()) status = 'REMIS!';
            else if (game.in_check()) status += ' (SKAK)';
            $('#game-status').text(status);

            // Update Eval
            const scoreVal = evaluateBoard(game) / 10;
            const display = scoreVal > 0 ? `+${scoreVal.toFixed(1)}` : scoreVal.toFixed(1);
            $('#eval-score').text(display);
            let p = 50 + (scoreVal * 4);
            p = Math.max(5, Math.min(95, p));
            $('#eval-bar').css('width', `${p}%`);

            // Update Captured
            $('#captured-white').empty();
            $('#captured-black').empty();
            captured.w.forEach(s => $('#captured-white').append(`<span class="text-lg opacity-60 text-zinc-100">${PIECE_SYMBOLS[s]}</span>`));
            captured.b.forEach(s => $('#captured-black').append(`<span class="text-lg opacity-60 text-zinc-900">${PIECE_SYMBOLS[s]}</span>`));

            // Update History
            const history = game.history();
            const $h = $('#move-history');
            $h.empty();
            for (let i = 0; i < history.length; i += 2) {
                const row = $(`
                    <div class="flex items-center gap-3 py-1 border-b border-zinc-800/30 px-1">
                        <span class="text-zinc-600 w-6">${Math.floor(i/2)+1}.</span>
                        <span class="font-bold flex-1 text-zinc-200">${history[i]}</span>
                        <span class="text-zinc-400 flex-1">${history[i+1] || ''}</span>
                    </div>
                `);
                $h.append(row);
            }
            $h.scrollTop($h[0].scrollHeight);
        }

        // --- BUTTON HANDLERS ---
        $('#undo-btn').on('click', () => {
            // Undo twice to go back to player's turn
            game.undo();
            game.undo();
            board.position(game.fen());
            updateUI();
        });

        $('#restart-btn').on('click', () => {
            game.reset();
            captured = { w: [], b: [] };
            board.start();
            if (playerColor === 'b') window.setTimeout(makeComputerMove, 600);
            updateUI();
        });

        $('#flip-btn').on('click', () => board.flip());

        $('.diff-btn').on('click', function() {
            $('.diff-btn').removeClass('bg-blue-600 text-white');
            $(this).addClass('bg-blue-600 text-white');
            currentDepth = parseInt($(this).data('value'));
        });

        $('#choose-white').on('click', function() {
            playerColor = 'w';
            $(this).addClass('ring-2 ring-blue-500');
            $('#choose-black').removeClass('ring-2 ring-blue-500');
            board.orientation('white');
            game.reset();
            captured = { w: [], b: [] };
            board.start();
            updateUI();
        });

        $('#choose-black').on('click', function() {
            playerColor = 'b';
            $(this).addClass('ring-2 ring-blue-500');
            $('#choose-white').removeClass('ring-2 ring-blue-500');
            board.orientation('black');
            game.reset();
            captured = { w: [], b: [] };
            board.start();
            updateUI();
            window.setTimeout(makeComputerMove, 800);
        });

        // --- INITIALIZATION ---
        const config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            onSnapEnd: () => board.position(game.fen()),
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };

        board = Chessboard('board', config);
        lucide.createIcons();
        updateUI();

        $(window).on('resize', () => board.resize());
    </script>
</body>
</html>
