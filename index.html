<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorting Game</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 { margin: 10px; }

#game {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.column {
  width: 120px;
  min-height: 200px;
  background: #1e293b;
  border-radius: 10px;
  padding: 10px;
}

.item {
  padding: 10px;
  margin: 6px 0;
  border-radius: 6px;
  cursor: grab;
  color: white;
}

.red { background: #ef4444; }
.blue { background: #3b82f6; }
.green { background: #22c55e; }

#ui { margin-top: 10px; }
button {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  background: #22c55e;
  color: white;
  cursor: pointer;
}
</style>
</head>
<body>

<h1>🎮 Sorting Game</h1>
<div id="ui">
Level: <span id="level">1</span>
<button onclick="startGame()">Restart</button>
</div>

<div id="game"></div>

<script>
let level = 1;
let dragged = null;

const colors = ['red','blue','green'];

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    let j=Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function generateLevel(){
  const game = document.getElementById('game');
  game.innerHTML='';

  let total = 6 + level * 3;
  let items = [];

  for(let i=0;i<total;i++){
    items.push(colors[i % colors.length]);
  }

  items = shuffle(items);

  colors.forEach(color=>{
    let col = document.createElement('div');
    col.className='column';
    col.dataset.color=color;

    col.addEventListener('dragover',e=>e.preventDefault());

    col.addEventListener('drop',()=>{
      if(dragged && dragged.classList.contains(color)){
        col.appendChild(dragged);
        checkWin();
      }
    });

    game.appendChild(col);
  });

  // spawn items
  items.forEach(color=>{
    let div=document.createElement('div');
    div.className='item '+color;
    div.draggable=true;
    div.textContent=color;

    div.addEventListener('dragstart',()=>{
      dragged=div;
    });

    game.appendChild(div);
  });
}

function checkWin(){
  let columns = document.querySelectorAll('.column');
  let win = true;

  columns.forEach(col=>{
    let color = col.dataset.color;
    [...col.children].forEach(item=>{
      if(!item.classList.contains(color)){
        win=false;
      }
    });
  });

  if(win){
    setTimeout(()=>{
      alert('Level '+level+' selesai!');
      level++;
      startGame();
    },300);
  }
}

function startGame(){
  document.getElementById('level').textContent=level;
  generateLevel();
}

startGame();
</script>

</body>
</html>
