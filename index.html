<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Space World</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#info {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  z-index:100;
}
</style>
</head>
<body>

<div id="info">🪐 Drag mouse untuk putar kamera</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 10;

// Renderer
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls (drag mouse)
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// Light
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(10,10,10);
scene.add(light);

// Planet
const planetGeometry = new THREE.SphereGeometry(2, 64, 64);
const planetMaterial = new THREE.MeshStandardMaterial({ color: 0x2266ff });
const planet = new THREE.Mesh(planetGeometry, planetMaterial);
scene.add(planet);

// Moon
const moonGeometry = new THREE.SphereGeometry(0.5, 32, 32);
const moonMaterial = new THREE.MeshStandardMaterial({ color: 0xaaaaaa });
const moon = new THREE.Mesh(moonGeometry, moonMaterial);
scene.add(moon);

let moonAngle = 0;

// Stars background
const starGeometry = new THREE.BufferGeometry();
const starCount = 2000;
const starVertices = [];

for(let i=0;i<starCount;i++){
  starVertices.push(
    (Math.random()-0.5)*1000,
    (Math.random()-0.5)*1000,
    (Math.random()-0.5)*1000
  );
}

starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
const starMaterial = new THREE.PointsMaterial({color:0xffffff});
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// Meteor
function createMeteor(){
  const geo = new THREE.SphereGeometry(0.2, 8, 8);
  const mat = new THREE.MeshBasicMaterial({color:0xff5500});
  const meteor = new THREE.Mesh(geo, mat);
  meteor.position.set(-20, Math.random()*10, 0);
  scene.add(meteor);

  let speed = 0.3 + Math.random()*0.5;

  function animateMeteor(){
    meteor.position.x += speed;
    meteor.position.y -= speed*0.3;
    if(meteor.position.x > 20){
      scene.remove(meteor);
    } else {
      requestAnimationFrame(animateMeteor);
    }
  }
  animateMeteor();
}

setInterval(createMeteor, 2000);

// Animation loop
function animate(){
  requestAnimationFrame(animate);

  planet.rotation.y += 0.005;

  moonAngle += 0.02;
  moon.position.x = Math.cos(moonAngle)*4;
  moon.position.z = Math.sin(moonAngle)*4;

  controls.update();
  renderer.render(scene, camera);
}

animate();

// Responsive
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
