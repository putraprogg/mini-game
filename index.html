<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Qunut Memorizer Pro</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Segoe UI,Arial;
margin:0;
background:#0f172a;
color:white;
text-align:center;
transition:0.3s;
}

.light{
background:#f2f2f2;
color:black;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
}

nav button{
margin:5px;
padding:10px 16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.line{
font-size:32px;
direction:rtl;
margin:15px;
padding:10px;
border-radius:10px;
background:rgba(255,255,255,0.05);
cursor:pointer;
}

.hidden{
color:transparent;
text-shadow:0 0 12px white;
}

.word{
padding:4px;
border-radius:6px;
}

.highlight{
background:#ffd54f;
color:black;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
border-radius:12px;
margin:20px 0;
}

input{
padding:8px;
font-size:18px;
width:80%;
}

.progress{
height:20px;
background:#333;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
width:0%;
background:#00ff9d;
}

.drag{
padding:10px;
margin:8px;
background:#2563eb;
border-radius:8px;
cursor:grab;
}

</style>
</head>

<body>

<header>🕌 Qunut Memorizer Pro</header>

<nav>
<button onclick="show('read')">📖 Baca</button>
<button onclick="show('memorize')">🧠 Hafalan</button>
<button onclick="show('typing')">✍ Ketik</button>
<button onclick="show('game')">🧩 Game</button>
<button onclick="show('voice')">🎤 Voice Test</button>
<button onclick="toggleTheme()">🌙 Mode</button>
</nav>

<div class="container">

<div id="read"></div>
<div id="memorize" style="display:none"></div>
<div id="typing" style="display:none"></div>
<div id="game" style="display:none"></div>
<div id="voice" style="display:none"></div>

</div>

<script>

const lines=[

"اَللّهُمَّ اهْدِنِىْ فِيْمَنْ هَدَيْتَ",
"وَعَافِنِى فِيْمَنْ عَافَيْتَ",
"وَتَوَلَّنِىْ فِيْمَنْ تَوَلَّيْتَ",
"وَبَارِكْ لِىْ فِيْمَا اَعْطَيْتَ",
"وَقِنِيْ شَرَّمَا قَضَيْتَ",
"فَاِنَّكَ تَقْضِىْ وَلاَ يُقْضَى عَلَيْكَ",
"وَاِنَّهُ لاَ يَذِلُّ مَنْ وَالَيْتَ",
"وَلاَ يَعِزُّ مَنْ عَادَيْتَ",
"تَبَارَكْتَ رَبَّنَا وَتَعَالَيْتَ",
"فَلَكَ الْحَمْدُ عَلَى مَا قَضَيْتَ",
"وَاَسْتَغْفِرُكَ وَاَتُوْبُ اِلَيْكَ",
"وَصَلَّى اللهُ عَلَى سَيِّدَنَا مُحَمَّدٍ النَّبِيِّ اْلاُمِّيِّ",
"وَعَلَى آلِهِ وَصَحْبِهِ وَسَلَّمَ"

]

function show(id){

document.querySelectorAll(".container > div").forEach(d=>d.style.display="none")
document.getElementById(id).style.display="block"

}

function toggleTheme(){

document.body.classList.toggle("light")

}

function renderRead(){

const div=document.getElementById("read")

lines.forEach(line=>{

let d=document.createElement("div")
d.className="line"

let words=line.split(" ")

words.forEach(w=>{
let span=document.createElement("span")
span.className="word"
span.textContent=w+" "
d.appendChild(span)
})

div.appendChild(d)

})

let btn=document.createElement("button")
btn.innerText="▶ Auto Read"
btn.onclick=autoRead
div.appendChild(btn)

}

function autoRead(){

let words=document.querySelectorAll(".word")
let i=0

function step(){

if(i>0) words[i-1].classList.remove("highlight")

if(i<words.length){

words[i].classList.add("highlight")

let u=new SpeechSynthesisUtterance(words[i].textContent)
u.lang="ar"
speechSynthesis.speak(u)

i++
setTimeout(step,800)

}

}

step()

}

function renderMemorize(){

const div=document.getElementById("memorize")

lines.forEach(l=>{

let d=document.createElement("div")
d.className="line hidden"
d.textContent=l

d.onclick=()=>d.classList.remove("hidden")

div.appendChild(d)

})

}

function renderTyping(){

const div=document.getElementById("typing")

let score=0

lines.forEach((l,i)=>{

let card=document.createElement("div")
card.className="card"

let p=document.createElement("p")
p.innerText="Ketik kalimat "+(i+1)

let input=document.createElement("input")

input.oninput=()=>{

if(input.value.trim()==l){

input.style.background="#00ff9d"
score++

}

}

card.appendChild(p)
card.appendChild(input)

div.appendChild(card)

})

}

function renderGame(){

const div=document.getElementById("game")

let shuffled=[...lines].sort(()=>Math.random()-0.5)

shuffled.forEach(l=>{

let d=document.createElement("div")
d.className="drag"
d.draggable=true
d.innerText=l

d.ondragstart=e=>{
e.dataTransfer.setData("text",l)
}

div.appendChild(d)

})

}

function renderVoice(){

const div=document.getElementById("voice")

let btn=document.createElement("button")
btn.innerText="🎤 Start Voice Test"

btn.onclick=()=>{

const rec=new(window.SpeechRecognition||window.webkitSpeechRecognition)()

rec.lang="ar-SA"

rec.start()

rec.onresult=e=>{
alert("Kamu membaca:\n"+e.results[0][0].transcript)
}

}

div.appendChild(btn)

}

renderRead()
renderMemorize()
renderTyping()
renderGame()
renderVoice()

</script>

</body>
</html>
