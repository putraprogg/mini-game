<!DOCTYPE html>
<html>
<head>
<title>Virtual Electronics Lab</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#020617;
padding:10px;
text-align:center;
font-size:22px;
}

#container{
display:flex;
height:90vh;
}

#components{
width:260px;
background:#1e293b;
overflow:auto;
padding:10px;
}

#workspace{
flex:1;
background:#020617;
position:relative;
}

.comp{
background:#334155;
padding:8px;
margin:6px;
border-radius:6px;
cursor:grab;
}

.item{
position:absolute;
padding:6px;
border-radius:6px;
background:#475569;
font-size:12px;
}

</style>

</head>

<body>

<header>⚡ Virtual Electronics Lab</header>

<div id="container">

<div id="components">

<h3>Power</h3>

<div class="comp" draggable="true" data="battery">Battery</div>
<div class="comp" draggable="true" data="adapter">Adapter</div>
<div class="comp" draggable="true" data="powersupply">Power Supply</div>
<div class="comp" draggable="true" data="ground">Ground</div>

<h3>Basic</h3>

<div class="comp" draggable="true" data="resistor">Resistor</div>
<div class="comp" draggable="true" data="capacitor">Capacitor</div>
<div class="comp" draggable="true" data="diode">Diode</div>
<div class="comp" draggable="true" data="led">LED</div>
<div class="comp" draggable="true" data="potentiometer">Potentiometer</div>

<h3>Input</h3>

<div class="comp" draggable="true" data="button">Push Button</div>
<div class="comp" draggable="true" data="switch">Switch</div>
<div class="comp" draggable="true" data="ldr">LDR</div>
<div class="comp" draggable="true" data="temp">Temp Sensor</div>

<h3>Output</h3>

<div class="comp" draggable="true" data="buzzer">Buzzer</div>
<div class="comp" draggable="true" data="motor">Motor</div>
<div class="comp" draggable="true" data="servo">Servo</div>

<h3>Controller</h3>

<div class="comp" draggable="true" data="arduino">Arduino UNO</div>

<h3>Hardware</h3>

<div class="comp" draggable="true" data="breadboard">Breadboard</div>
<div class="comp" draggable="true" data="wire">Jumper Wire</div>

</div>

<div id="workspace"></div>

</div>

<script>

let workspace=document.getElementById("workspace")

document.querySelectorAll(".comp").forEach(el=>{
el.addEventListener("dragstart",e=>{
e.dataTransfer.setData("type",el.getAttribute("data"))
})
})

workspace.addEventListener("dragover",e=>e.preventDefault())

workspace.addEventListener("drop",function(e){

let type=e.dataTransfer.getData("type")

let item=document.createElement("div")

item.className="item"

item.innerText=type

item.style.left=e.offsetX+"px"
item.style.top=e.offsetY+"px"

workspace.appendChild(item)

})

</script>

</body>
</html>
